services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-agent-core-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_core
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ai-agent-core-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agent:agent@postgres:5432/agent_core
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
